<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline | Chitrapat</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        color: #ededed;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      .card {
        width: min(92vw, 520px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 24px;
        background: #141414;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.3rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #b3b3b3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Chitrapat can open previously cached pages. Reconnect to access fresh
        movies, shows, and search results.
      </p>
    </div>
  </body>
</html>
